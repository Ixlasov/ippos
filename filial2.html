<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>IP POS Tizimi</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }
        
        .float-button {
            position: fixed;
            top: 5px;
            left: 150px;
            width: 40px;
            height: 40px;
            background: rgba(128, 128, 128, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: move;
            transition: background 0.3s ease;
            z-index: 9999;
            user-select: none;
            touch-action: none;
        }
        
        .float-button:hover {
            background: rgba(128, 128, 128, 0.25);
        }
        
        .float-button svg {
            width: 22px;
            height: 22px;
            fill: #555;
            pointer-events: none;
        }
    </style>
</head>
<body>

<iframe src="https://script.google.com/macros/s/AKfycbw8ieE63oE87YMttVh7Gf5jAE4W35FJUBTrOe0g2bxpexx5mkQHXPq_6EPH0qsg2XX_kQ/exec" id="mainFrame"></iframe>

<div class="float-button" id="floatBtn">
    <svg id="icon" viewBox="0 0 24 24">
        <path id="expandIcon" d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
        <path id="shrinkIcon" style="display:none;" d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>
    </svg>
</div>

<script>
    let isFullscreen = false;
    const floatBtn = document.getElementById('floatBtn');
    let isDragging = false;
    let startX, startY, startLeft, startTop;
    let hasMoved = false;
    
    // Mouse/Touch boshlash
    floatBtn.addEventListener('mousedown', startDrag);
    floatBtn.addEventListener('touchstart', startDrag);
    
    function startDrag(e) {
        isDragging = true;
        hasMoved = false;
        
        const touch = e.type === 'touchstart' ? e.touches[0] : e;
        startX = touch.clientX;
        startY = touch.clientY;
        
        const rect = floatBtn.getBoundingClientRect();
        startLeft = rect.left;
        startTop = rect.top;
        
        floatBtn.style.transition = 'none';
    }
    
    // Siljitish
    document.addEventListener('mousemove', drag);
    document.addEventListener('touchmove', drag);
    
    function drag(e) {
        if (!isDragging) return;
        
        e.preventDefault();
        const touch = e.type === 'touchmove' ? e.touches[0] : e;
        
        const deltaX = touch.clientX - startX;
        const deltaY = touch.clientY - startY;
        
        // Agar 5px dan ko'p siljigan bo'lsa, dragging deb hisoblash
        if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
            hasMoved = true;
        }
        
        const newLeft = startLeft + deltaX;
        const newTop = startTop + deltaY;
        
        // Ekran chegaralarini tekshirish
        const maxX = window.innerWidth - floatBtn.offsetWidth;
        const maxY = window.innerHeight - floatBtn.offsetHeight;
        
        floatBtn.style.left = Math.max(0, Math.min(newLeft, maxX)) + 'px';
        floatBtn.style.top = Math.max(0, Math.min(newTop, maxY)) + 'px';
    }
    
    // Qo'yib yuborish
    document.addEventListener('mouseup', stopDrag);
    document.addEventListener('touchend', stopDrag);
    
    function stopDrag() {
        if (isDragging) {
            isDragging = false;
            floatBtn.style.transition = 'background 0.3s ease';
            
            // Agar siljimagan bo'lsa, fullscreen toggle qilish
            if (!hasMoved) {
                toggleFullscreen();
            }
        }
    }
    
    function toggleFullscreen() {
        const elem = document.documentElement;
        const expandIcon = document.getElementById('expandIcon');
        const shrinkIcon = document.getElementById('shrinkIcon');
        
        if (!isFullscreen) {
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
            expandIcon.style.display = 'none';
            shrinkIcon.style.display = 'block';
            isFullscreen = true;
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            } else if (document.msExitFullscreen) {
                document.msExitFullscreen();
            }
            expandIcon.style.display = 'block';
            shrinkIcon.style.display = 'none';
            isFullscreen = false;
        }
    }
    
    // ESC tugmasi bosilganda
    document.addEventListener('fullscreenchange', function() {
        if (!document.fullscreenElement) {
            document.getElementById('expandIcon').style.display = 'block';
            document.getElementById('shrinkIcon').style.display = 'none';
            isFullscreen = false;
        }
    });
</script>

</body>
</html>
